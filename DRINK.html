<!doctype html>
<html lang="en" data-theme="red">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DRINK!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <style>
/* ── COLORS & TYPE FOUNDATIONS ────────────────────────────────── */
:root {
  --drink-red:    #E43636;
  --drink-cream:  #F6EFD2;
  --drink-ink:    #1E1E1E;
  --drink-red-deep:    #B72525;
  --drink-red-glow:    #FF5A4A;
  --drink-cream-deep:  #E6DDB8;
  --drink-ink-dim:     #3A3A3A;
  --bg:           var(--drink-red);
  --fg:           var(--drink-cream);
  --fg-dim:       rgba(246,239,210,0.55);
  --surface:      var(--drink-cream);
  --surface-ink:  var(--drink-ink);
  --border:       var(--drink-ink);
  --shadow-color: var(--drink-ink);
  --btn-fill:        var(--drink-cream);
  --btn-text:        var(--drink-ink);
  --btn-hover-fill:  var(--drink-ink);
  --btn-hover-text:  var(--drink-cream);
  --panel-bg:       var(--drink-cream);
  --panel-text:     var(--drink-ink);
  --panel-border:   var(--drink-ink);
  --accent:         var(--drink-cream);
  --accent-ink:     var(--drink-ink);
  --page-bg: var(--bg);
  --page-fg: var(--fg);
  --font-display: "Pixelify Sans", "VT323", monospace;
  --font-body:    "Pixelify Sans", "VT323", monospace;
  --fs-mega:    101px;
  --fs-jumbo:   88px;
  --fs-display: 65px;
  --fs-h1:      56px;
  --fs-h2:      48px;
  --fs-h3:      44px;
  --fs-body:    32px;
  --fs-small:   24px;
  --border-w:        2.581px;
  --border-w-thick:  4px;
  --border-radius:   0px;
  --sp-0:0; --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px;
  --sp-5:24px; --sp-6:32px; --sp-7:48px; --sp-8:64px;
  --shadow-pixel-sm: 3px 3px 0 0 var(--drink-ink);
  --shadow-pixel-md: 6px 6px 0 0 var(--drink-ink);
  --shadow-pixel-lg: 10px 10px 0 0 var(--drink-ink);
  --shadow-pixel-red: 6px 6px 0 0 var(--drink-red);
  --motion-snap:   80ms steps(2, end);
  --motion-quick:  120ms steps(3, end);
  --motion-blink:  600ms steps(2, end) infinite;
}

/* ── THEME OVERRIDES ──────────────────────────────────────────── */
html[data-theme="red"] {
  --bg: var(--drink-red); --fg: var(--drink-cream);
  --fg-dim: rgba(246,239,210,0.55);
  --btn-fill: var(--drink-cream); --btn-text: var(--drink-ink);
  --btn-hover-fill: var(--drink-ink); --btn-hover-text: var(--drink-cream);
  --panel-bg: var(--drink-cream); --panel-text: var(--drink-ink); --panel-border: var(--drink-ink);
  --accent: var(--drink-cream); --accent-ink: var(--drink-ink);
}
html[data-theme="cream"] {
  --bg: var(--drink-cream); --fg: var(--drink-ink);
  --fg-dim: rgba(30,30,30,0.55);
  --btn-fill: var(--drink-red); --btn-text: var(--drink-cream);
  --btn-hover-fill: var(--drink-ink); --btn-hover-text: var(--drink-cream);
  --panel-bg: var(--drink-cream); --panel-text: var(--drink-ink); --panel-border: var(--drink-ink);
  --accent: var(--drink-red); --accent-ink: var(--drink-ink);
}
html[data-theme="ink"] {
  --bg: var(--drink-ink); --fg: var(--drink-cream);
  --fg-dim: rgba(246,239,210,0.55);
  --btn-fill: var(--drink-cream); --btn-text: var(--drink-ink);
  --btn-hover-fill: var(--drink-red); --btn-hover-text: var(--drink-cream);
  --panel-bg: var(--drink-cream); --panel-text: var(--drink-ink); --panel-border: var(--drink-ink);
  --accent: var(--drink-red); --accent-ink: var(--drink-cream);
}
html[data-theme="red"] body   { background: var(--drink-red)   !important; color: var(--drink-cream) !important; }
html[data-theme="cream"] body { background: var(--drink-cream) !important; color: var(--drink-ink)   !important; }
html[data-theme="ink"] body   { background: var(--drink-ink)   !important; color: var(--drink-cream) !important; }

/* ── BASE ────────────────────────────────────────────────────── */
html, body {
  margin: 0; padding: 0; width: 100%;
  height: 100%; min-height: 100vh; min-height: 100dvh;
  background: var(--bg); color: var(--fg);
  font-family: var(--font-display);
  overflow-x: hidden;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: unset;
  font-smooth: never;
  text-rendering: geometricPrecision;
  transition: background-color 80ms steps(2,end), color 80ms steps(2,end);
}
*, *::before, *::after { box-sizing: border-box; }
img, svg { image-rendering: pixelated; image-rendering: crisp-edges; }
button, input, textarea { font-family: var(--font-display); }
::selection { background: var(--drink-ink); color: var(--drink-cream); }
html[data-theme="cream"] ::selection { background: var(--drink-red); color: var(--drink-cream); }

/* ── LAYOUT ──────────────────────────────────────────────────── */
#root {
  width: 100%; min-height: 100vh; min-height: 100dvh;
  position: relative; display: flex; flex-direction: column;
}
.screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: clamp(72px,9vh,120px) clamp(16px,4vw,48px) clamp(32px,6vh,64px);
  width: 100%; max-width: min(1280px,96vw); margin: 0 auto;
  gap: clamp(14px,2.4vh,32px); position: relative; z-index: 1;
}
.screen[data-screen-label^="02"],
.screen[data-screen-label^="03"],
.screen[data-screen-label^="04"] { justify-content: flex-start; }
@media (max-width: 720px) { .screen { gap: 16px; } }

/* ── WORDMARK ────────────────────────────────────────────────── */
.wordmark { max-width: min(92vw,520px); height: auto !important; width: auto !important; }
.screen[data-screen-label^="01"] .wordmark { width: clamp(240px,56vw,520px) !important; }
.screen[data-screen-label^="02"] .wordmark,
.screen[data-screen-label^="03"] .wordmark { width: clamp(140px,26vw,240px) !important; }

/* ── GAME STAGE ──────────────────────────────────────────────── */
@media (max-width:720px) { .game-stage { transform: scale(0.7); transform-origin: top center; } }
@media (max-width:500px) { .game-stage { transform: scale(0.55); transform-origin: top center; } }

/* ── ANIMATIONS ──────────────────────────────────────────────── */
@keyframes drink-blink   { 0%,49%{opacity:1}50%,100%{opacity:0} }
@keyframes drink-shake   { 0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-2px)} }
@keyframes drink-bob     { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }
@keyframes ghost-blink   { 0%,65%{opacity:0.32}70%,95%{opacity:0.18} }
@keyframes card-shake    { 0%,100%{transform:translate(0,0)rotate(0deg)}25%{transform:translate(-1px,1px)rotate(-0.4deg)}75%{transform:translate(1px,-1px)rotate(0.4deg)} }
@keyframes bottle-wobble { 0%,100%{transform:translateX(0)}50%{transform:translateX(2px)} }
  </style>
</head>

  <!-- CORE: useTheme, Wordmark, Button, ThemeSwitch, Bottle, GhostStack -->
  <script type="text/babel">
function useTheme() {
  const [theme, setTheme] = React.useState(() => {
    try { return localStorage.getItem("drink-theme") || "red"; }
    catch { return "red"; }
  });
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("drink-theme", theme); } catch {}
  }, [theme]);
  return [theme, setTheme];
}
window.useTheme = useTheme;

function Wordmark({ size = 320, theme = "red", style }) {
  const src = theme === "red"
    ? window.ASSETS.logoRed
    : theme === "cream"
    ? window.ASSETS.logoCream
    : window.ASSETS.logoInk;
  const w = size;
  const h = size * (442 / 462);
  return (
    <img
      src={src}
      alt="DRINK!"
      width={w}
      height={h}
      className="wordmark"
      style={style}
    />
  );
}
window.Wordmark = Wordmark;

function Button({ children, onClick, disabled = false, size = "md", style, title }) {
  const [hover, setHover] = React.useState(false);
  const [active, setActive] = React.useState(false);
  const dims = {
    sm: { h: 44, fs: 24, px: 14, sh: "3px 3px 0 0" },
    md: { h: 60, fs: 32, px: 22, sh: "5px 5px 0 0" },
    lg: { h: 78, fs: 42, px: 30, sh: "6px 6px 0 0" },
    xl: { h: 110, fs: 64, px: 44, sh: "8px 8px 0 0" },
  }[size];
  const bg = disabled ? "var(--btn-fill)" : hover ? "var(--btn-hover-fill)" : "var(--btn-fill)";
  const fg = disabled ? "var(--btn-text)" : hover ? "var(--btn-hover-text)" : "var(--btn-text)";
  return (
    <button
      onClick={disabled ? undefined : onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => { setHover(false); setActive(false); }}
      onMouseDown={() => setActive(true)}
      onMouseUp={() => setActive(false)}
      disabled={disabled}
      title={title}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        height: dims.h, padding: `0 ${dims.px}px`, minWidth: 160,
        border: "2.581px solid var(--drink-ink)",
        background: bg, backgroundColor: bg, color: fg,
        fontWeight: 700, fontSize: dims.fs, lineHeight: "100%", letterSpacing: 0,
        cursor: disabled ? "not-allowed" : "pointer", opacity: 1,
        transform: active ? "translate(3px,3px)" : "translate(0,0)",
        boxShadow: active || disabled ? "0 0 0 0 var(--drink-ink)" : `${dims.sh} var(--drink-ink)`,
        transition: "transform 80ms steps(2,end), box-shadow 80ms steps(2,end), background-color 80ms steps(2,end), color 80ms steps(2,end)",
        userSelect: "none", whiteSpace: "nowrap",
        ...style
      }}
    >
      <span style={{ opacity: disabled ? 0.55 : 1 }}>{children}</span>
    </button>
  );
}
window.Button = Button;

function ThemeSwitch({ theme, setTheme }) {
  const themes = [
    { id: "red",   color: "#E43636" },
    { id: "cream", color: "#F6EFD2" },
    { id: "ink",   color: "#1E1E1E" },
  ];
  return (
    <div role="radiogroup" aria-label="theme" style={{
      position: "fixed", top: 24, right: 24, zIndex: 200,

  <script type="text/babel">
const CARD_W = 240;
const CARD_H = 355;
const WHEEL_R = 280;
const WHEEL_SIZE = 660;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function usePromptDeck(mode) {
  const [decks, setDecks] = React.useState({
    truth: shuffle(PROMPTS[mode].truth),
    dare:  shuffle(PROMPTS[mode].dare),
  });
  React.useEffect(() => {
    setDecks({ truth: shuffle(PROMPTS[mode].truth), dare: shuffle(PROMPTS[mode].dare) });
  }, [mode]);
  const draw = (kind) => {
    const q = decks[kind];
    if (!q.length) {
      const fresh = shuffle(PROMPTS[mode][kind]);
      const [first, ...rest] = fresh;
      setDecks((d) => ({ ...d, [kind]: rest }));
      return first;
    }
    const [first, ...rest] = q;
    setDecks((d) => ({ ...d, [kind]: rest }));
    return first;
  };
  return draw;
}

function CardBack({ size = 1, label }) {
  return (
    <div style={{
      width: CARD_W * size, height: CARD_H * size,
      background: "var(--drink-red)", border: `${3 * size}px solid var(--drink-ink)`,
      padding: 12 * size, display: "flex", alignItems: "center", justifyContent: "center",
      boxSizing: "border-box", color: "var(--drink-cream)",
    }}>
      <div style={{
        width: "100%", height: "100%",
        border: `${2 * size}px solid var(--drink-cream)`,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexDirection: "column", gap: 14 * size,
        backgroundImage: "repeating-linear-gradient(45deg,rgba(246,239,210,0.18) 0 6px,transparent 6px 14px)",
      }}>
        <div style={{
          background: "var(--drink-red)", padding: `${10 * size}px ${16 * size}px`,
          border: `${2 * size}px solid var(--drink-cream)`,
          fontSize: 38 * size, fontWeight: 700, letterSpacing: 2,
        }}>DRINK!</div>
        {label && (
          <div style={{
            background: "var(--drink-cream)", color: "var(--drink-ink)",
            padding: `${4 * size}px ${12 * size}px`,
            border: `${2 * size}px solid var(--drink-ink)`,
            fontSize: 26 * size, fontWeight: 700, letterSpacing: 1,
          }}>{label}</div>
        )}
      </div>
    </div>
  );
}

function FlipCard({ flipped, kind, label }) {
  return (
    <div style={{ width: CARD_W, height: CARD_H, perspective: 1200 }}>
      <div style={{
        width: "100%", height: "100%", position: "relative",
        transformStyle: "preserve-3d",
        transition: "transform 520ms steps(8,end)",
        transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",

}

function GameScreen({ players, mode, onQuit, theme }) {
  const [phase, setPhase] = React.useState("idle");
  const [angle, setAngle] = React.useState(0);
  const [pickedIdx, setPickedIdx] = React.useState(null);
  const [choice, setChoice] = React.useState(null);
  const [prompt, setPrompt] = React.useState("");
  const [round, setRound] = React.useState(1);
  const drawPrompt = usePromptDeck(mode);
  const N = players.length;

  const positions = React.useMemo(() => {
    return players.map((_, i) => {
      const theta = i / N * 2 * Math.PI - Math.PI / 2;
      return { x: Math.cos(theta) * WHEEL_R, y: Math.sin(theta) * WHEEL_R };
    });
  }, [N]);

  const spin = () => {
    if (phase === "spinning") return;
    setPhase("spinning");
    setChoice(null);
    setPrompt("");
    const target = Math.floor(Math.random() * N);
    const targetDeg = target * (360 / N);
    const currentMod = (angle % 360 + 360) % 360;
    const delta = (targetDeg - currentMod + 360) % 360;
    const spins = 5 + Math.floor(Math.random() * 3);
    const newAngle = angle + spins * 360 + delta;
    setAngle(newAngle);
    setTimeout(() => {
      setPickedIdx(target);
      setPhase("picked");
      setTimeout(() => setPhase("choose"), 1100);
    }, 4250);
  };

  const pick = (kind) => {
    if (phase !== "choose") return;
    setChoice(kind);
    setPrompt(drawPrompt(kind));
    setPhase("flipping");
    setTimeout(() => setPhase("moving"), 540);
    setTimeout(() => setPhase("reveal"), 540 + 700);
  };

  const nextTurn = () => {
    setChoice(null); setPrompt(""); setPickedIdx(null);
    setPhase("idle"); setRound((r) => r + 1);
  };

  const showWheel = phase === "idle" || phase === "spinning" || phase === "picked";
  const showCards = phase === "choose" || phase === "flipping" || phase === "moving" || phase === "reveal";

  const truthLeft = (phase === "moving" || phase === "reveal")
    ? choice === "truth" ? "50%" : "-30%"
    : "22%";
  const dareLeft = (phase === "moving" || phase === "reveal")
    ? choice === "dare" ? "50%" : "130%"
    : "78%";
  const truthOpacity = (phase === "moving" || phase === "reveal") && choice !== "truth" ? 0 : 1;
  const dareOpacity  = (phase === "moving" || phase === "reveal") && choice !== "dare"  ? 0 : 1;
  const pickedName = pickedIdx != null ? players[pickedIdx] : null;

  return (
    <div className="screen" data-screen-label="04 Game" style={{ paddingTop: 100 }}>
      {/* Top status row */}
      <div style={{
        width: "100%", maxWidth: 900,
        display: "flex", justifyContent: "space-between", alignItems: "center",
        fontSize: 22, opacity: 0.6,
      }}>
        <span>round {round.toString().padStart(2,"0")}</span>
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 8,
          border: "2.581px solid var(--page-fg)", padding: "4px 12px",
          fontWeight: 700, opacity: 0.85,
        }}>{mode === "spicy" ? "18+ mode" : "fun drinks"}</span>
        <button onClick={onQuit} style={{
          background: "transparent", border: "2.581px solid var(--page-fg)",
          color: "var(--page-fg)", padding: "4px 12px",
          fontFamily: "var(--font-display)", fontSize: 20, cursor: "pointer", fontWeight: 700,
        }}>× quit</button>
      </div>

      {/* Headline */}
      <div style={{ textAlign: "center", minHeight: 76 }}>
        {phase === "idle" && <div style={{ fontSize: 48, fontWeight: 700 }}>spin the bottle</div>}
        {phase === "spinning" && (
          <div style={{ fontSize: 48, fontWeight: 700, opacity: 0.7 }}>
            <span style={{ display: "inline-block", animation: "ghost-blink 600ms steps(2,end) infinite" }}>spinning…</span>
          </div>
        )}
        {phase === "picked" && pickedName && (
          <div style={{ fontSize: 56, fontWeight: 700 }}>
            <span style={{ color: "var(--accent)" }}>{pickedName}</span>
            <span style={{ opacity: 0.55, fontSize: 32, marginLeft: 14 }}>your turn</span>
          </div>
        )}
        {phase === "choose" && pickedName && (
          <div style={{ fontSize: 44, fontWeight: 700 }}>
            <span style={{ color: "var(--accent)" }}>{pickedName}</span>
            <span style={{ opacity: 0.55, fontSize: 28, marginLeft: 12 }}>—</span>
            <span style={{ marginLeft: 12 }}>pick a card</span>
          </div>
        )}
        {(phase === "flipping" || phase === "moving") && pickedName && (
          <div style={{ fontSize: 44, fontWeight: 700, opacity: 0.85 }}>
            <span style={{ color: "var(--accent)" }}>{pickedName}</span>
            <span style={{ opacity: 0.55, fontSize: 28, marginLeft: 12 }}>chose</span>
            <span style={{ marginLeft: 12 }}>{choice}</span>
          </div>
        )}
        {phase === "reveal" && pickedName && (
          <div style={{ fontSize: 40, fontWeight: 700 }}>
            <span style={{ color: "var(--accent)" }}>{pickedName}</span>
            <span style={{ opacity: 0.55, fontSize: 28, marginLeft: 12 }}>—</span>
            <span style={{ marginLeft: 12, textTransform: "lowercase" }}>{choice}</span>
          </div>
        )}
      </div>

      {/* Stage */}
      <div className="game-stage" style={{ position: "relative", width: "100%", maxWidth: WHEEL_SIZE, height: WHEEL_SIZE }}>
        {/* Wheel */}
        <div style={{
          position: "absolute", inset: 0,
          opacity: showWheel ? 1 : 0, pointerEvents: showWheel ? "auto" : "none",
          transition: "opacity 120ms steps(3,end)",
        }}>
          <div style={{
            position: "absolute", left: "50%", top: "50%",
            width: WHEEL_R * 2 + 20, height: WHEEL_R * 2 + 20,
            transform: "translate(-50%,-50%)",
            border: "2.581px dashed var(--page-fg)", opacity: 0.25,
            borderRadius: "50%", pointerEvents: "none",
          }} />
          {players.map((p, i) => (
            <NamePlate key={p+i} idx={i} name={p} x={positions[i].x} y={positions[i].y}
              picked={pickedIdx === i && phase !== "idle" && phase !== "spinning"} />
          ))}
          <div style={{ position: "absolute", left: "50%", top: "50%", transform: "translate(-50%,-50%)" }}>
            <Bottle size={260} angle={angle} spinning={phase === "spinning"} duration={4200} />
          </div>
        </div>

        {/* Cards */}
        <div style={{
          position: "absolute", inset: 0,
          opacity: showCards ? 1 : 0, pointerEvents: showCards ? "auto" : "none",
          transition: "opacity 200ms steps(3,end)",
        }}>
          <div style={{
            position: "absolute", top: "50%", left: truthLeft,
            transform: "translate(-50%,-50%)", opacity: truthOpacity,
            transition: "left 700ms steps(10,end), opacity 300ms steps(3,end)",
            zIndex: choice === "truth" ? 2 : 1,
          }}>
            <CardSlot kind="J" label="truth"
              flipped={choice === "truth" && (phase === "flipping" || phase === "moving" || phase === "reveal")}
              hoverable={phase === "choose"} onClick={() => pick("truth")} />
          </div>
          <div style={{
            position: "absolute", top: "50%", left: dareLeft,
            transform: "translate(-50%,-50%)", opacity: dareOpacity,
            transition: "left 700ms steps(10,end), opacity 300ms steps(3,end)",
            zIndex: choice === "dare" ? 2 : 1,
          }}>
            <CardSlot kind="Q" label="dare"
              flipped={choice === "dare" && (phase === "flipping" || phase === "moving" || phase === "reveal")}
              hoverable={phase === "choose"} onClick={() => pick("dare")} />
          </div>
        </div>
      </div>

      {/* Action row */}
      <div style={{ minHeight: 100, display: "flex", flexDirection: "column", alignItems: "center", gap: 18 }}>
        {phase === "idle" && <Button onClick={spin} size="xl" style={{ minWidth: 280 }}>spin it</Button>}
        {phase === "picked" && <Button onClick={() => setPhase("choose")} size="lg">draw a card →</Button>}
        {phase === "reveal" && prompt && (
          <>
            <PromptPanel text={prompt} kind={choice} />
            <div style={{ display: "flex", gap: 14, flexWrap: "wrap", justifyContent: "center" }}>
              <Button onClick={nextTurn} size="lg">did it →</Button>
              <Button onClick={nextTurn} size="lg" title="skip & drink">drink up!</Button>
            </div>
            <div style={{ fontSize: 18, opacity: 0.5 }}>chickening out? same energy. next player.</div>
          </>
        )}
      </div>
    </div>
  );
}
window.GameScreen = GameScreen;
  </script>

  <!-- APP -->
  <script type="text/babel">
function BgGhost() {
  return (
    <div aria-hidden="true" style={{
      position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0, overflow: "hidden",
    }}>
      <div style={{
        position: "absolute", bottom: -32, left: -16,
        fontFamily: "var(--font-display)", fontWeight: 700,
        fontSize: 220, letterSpacing: -4,
        color: "var(--page-fg)", opacity: 0.06, lineHeight: 1, userSelect: "none",
      }}>drink!</div>
      <div style={{
        position: "absolute", top: -24, right: -8,
        fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 90,
        color: "var(--page-fg)", opacity: 0.05, lineHeight: 1, userSelect: "none",
      }}>est. 2am</div>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useTheme();
  const [stage, setStage] = React.useState("title");
  const [players, setPlayers] = React.useState([]);
  const [mode, setMode] = React.useState(null);

  React.useEffect(() => {
    if (theme === "cream") {
      document.body.style.setProperty("background-color", "#F6EFD2", "important");
      document.body.style.setProperty("color", "#1E1E1E", "important");
    } else if (theme === "ink") {
      document.body.style.setProperty("background-color", "#1E1E1E", "important");
      document.body.style.setProperty("color", "#F6EFD2", "important");
    } else {
      document.body.style.setProperty("background-color", "#E43636", "important");
      document.body.style.setProperty("color", "#F6EFD2", "important");
    }
  }, [theme]);

  const quitToTitle = () => { setStage("title"); setMode(null); };

  return (
    <>
      <ThemeSwitch theme={theme} setTheme={setTheme} />
      <BgGhost />
      {stage === "title" && <TitleScreen theme={theme} onStart={() => setStage("roster")} />}
      {stage === "roster" && (
        <RosterScreen theme={theme} players={players} setPlayers={setPlayers}
          onBack={() => setStage("title")} onNext={() => setStage("mode")} />
      )}
      {stage === "mode" && (
        <ModeScreen theme={theme} onBack={() => setStage("roster")} onPick={(m) => { setMode(m); setStage("game"); }} />
      )}
      {stage === "game" && mode && (
        <GameScreen theme={theme} players={players} mode={mode} onQuit={quitToTitle} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
